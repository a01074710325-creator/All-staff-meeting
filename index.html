<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교직원 회의 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard" id="dashboard-bg">
        <div class="clock-area">
            <div class="analog-clock">
                <div class="hand hour" id="hour-hand"></div>
                <div class="hand minute" id="min-hand"></div>
                <div class="hand second" id="sec-hand"></div>
                <div class="center-dot"></div>
                <div class="number n12">12</div>
                <div class="number n3">3</div>
                <div class="number n6">6</div>
                <div class="number n9">9</div>
            </div>
        </div>

        <div class="qr-area">
            <div class="qr-container">
                <p class="qr-label">연수 등록부</p>
                <img id="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=Welcome" alt="QR Code">
            </div>
        </div>

        <div class="main-content">
            <h1 id="meeting-title">교직원 회의</h1>
            <div class="agenda-wrapper">
                <ul id="agenda-list">
                    </ul>
            </div>
        </div>

        <div class="music-area">
            <div id="youtube-player"></div>
            <div class="music-controls">
                <button id="music-toggle" class="music-btn">
                    <span id="music-icon">🎵</span> <span id="music-status">Music ON</span>
                </button>
            </div>
        </div>

        <div class="admin-trigger">
            <button id="open-admin">⚙️ 설정</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h2>🛠️ 관리자 설정</h2>
            
            <div class="input-group">
                <label>배경화면 업로드 (따뜻한 그림 파일)</label>
                <input type="file" id="admin-bg-upload" accept="image/*">
            </div>

            <div class="input-group">
                <label>연수 등록부 QR 업로드 (이미지 파일)</label>
                <input type="file" id="admin-qr-upload" accept="image/*">
            </div>
            
            <div class="input-group">
                <label>회의 제목</label>
                <input type="text" id="admin-title-input" placeholder="회의 제목을 입력하세요">
            </div>
            
            <div class="input-group">
                <label>회의 순서 (줄바꿈으로 구분)</label>
                <textarea id="admin-agenda-input" rows="4" placeholder="예시:&#10;1. 개회 선언&#10;2. 학교장 인사말씀"></textarea>
            </div>
            
            <div class="input-group">
                <label>유튜브 배경음악 링크</label>
                <input type="text" id="admin-yt-input" placeholder="유튜브 영상 주소(URL) 전체를 복사해서 붙여넣으세요">
            </div>
            
            <div class="modal-btns">
                <button id="save-admin" class="save-btn">저장하기</button>
                <button id="close-admin" class="cancel-btn">닫기</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
